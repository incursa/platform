name: 'Main/Release CI/CD'
on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_packages:
        description: Publish the catalog allowlisted packages from this run to nuget.org
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run smoke lane
        shell: pwsh
        run: pwsh -File scripts/quality/run-smoke-tests.ps1 -NoRestore -NoBuild

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-lane-artifacts
          path: artifacts/codex/test-results/smoke/

  blocking:
    name: Blocking lane
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Fetch main for affected package diff
        run: git fetch origin main --depth=1

      - name: Determine diff base
        id: diff_base
        shell: pwsh
        run: |
          $baseRef = "${{ github.event.before }}".Trim()
          $zeroSha = "0000000000000000000000000000000000000000"

          if ([string]::IsNullOrWhiteSpace($baseRef) -or $baseRef -eq $zeroSha) {
            $baseRef = (git merge-base origin/main HEAD).Trim()
          }

          if ([string]::IsNullOrWhiteSpace($baseRef)) {
            throw "Could not resolve a diff base for package version validation."
          }

          echo "mergeBase=$baseRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate package version bumps
        shell: pwsh
        run: pwsh -File eng/Test-PackageVersionChanges.ps1 -Base "${{ steps.diff_base.outputs.mergeBase }}" -Head HEAD

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run blocking lane
        shell: pwsh
        run: pwsh -File scripts/quality/run-blocking-tests.ps1 -NoRestore -NoBuild

      - name: Regenerate package catalog
        shell: pwsh
        run: pwsh -File eng/Generate-PackageCatalog.ps1

      - name: Pack publishable packages
        shell: pwsh
        run: pwsh -File eng/Pack-PublicPackages.ps1 -Configuration Release -OutputPath ./nupkgs -PublishableOnly

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          if-no-files-found: warn
          path: ./nupkgs/*.nupkg

      - name: Upload blocking artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blocking-lane-artifacts
          path: artifacts/codex/test-results/blocking/

  observational:
    name: Observational lane
    runs-on: ubuntu-latest
    needs: smoke
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run observational lane
        shell: pwsh
        run: pwsh -File scripts/quality/run-observational-tests.ps1 -NoRestore -NoBuild

      - name: Upload observational artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observational-lane-artifacts
          path: artifacts/codex/test-results/observational/

  advisory:
    name: Advisory quality lane
    runs-on: ubuntu-latest
    needs: smoke
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run advisory quality evidence
        shell: pwsh
        run: pwsh -File scripts/quality/run-quality-evidence.ps1 -NoRestore -NoBuild

      - name: Upload advisory artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: advisory-quality-artifacts
          path: |
            artifacts/codex/test-results/advisory/
            artifacts/codex/coverage/advisory/
            artifacts/quality/testing/

  publish-nuget-org:
    needs: blocking
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.publish_packages) ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: out

      - name: Push to nuget.org
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
