name: 'Continuous Integration on Commit'
on:
  workflow_dispatch:
  merge_group:
  push:
    branches-ignore:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run smoke lane
        shell: pwsh
        run: pwsh -File scripts/quality/run-smoke-tests.ps1 -NoRestore -NoBuild

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-lane-artifacts
          path: artifacts/codex/test-results/smoke/

  blocking:
    name: Blocking lane
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Determine Version
        id: git_version
        shell: pwsh
        run: |
          $now = [System.DateTime]::UtcNow
          $revision = $now.Hour * 60 + $now.Minute
          $baseVersion = "$($now.Year).$($now.Month).$($now.Day).$revision"
          $version = $baseVersion

          try {
            $branchName = (git rev-parse --abbrev-ref HEAD).Trim()
            $mainBranches = @("main", "master")

            if ($branchName -and ($mainBranches -notcontains $branchName.ToLowerInvariant())) {
              $safeBranch = $branchName -replace '[^A-Za-z0-9-]', '-'
              $version = "$baseVersion-$safeBranch"
            }
          } catch {
            Write-Warning "Could not determine git branch. Using base version."
          }

          echo "semVer=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release -p:Version=${{ steps.git_version.outputs.semVer }}

      - name: Run blocking lane
        shell: pwsh
        run: pwsh -File scripts/quality/run-blocking-tests.ps1 -NoRestore -NoBuild

      - name: Fetch main for affected package diff
        run: git fetch origin main --depth=1

      - name: Determine merge base
        id: diff_base
        shell: pwsh
        run: |
          $mergeBase = (git merge-base origin/main HEAD).Trim()
          if ([string]::IsNullOrWhiteSpace($mergeBase)) {
            throw "Could not resolve merge base against origin/main."
          }

          echo "mergeBase=$mergeBase" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Regenerate package catalog
        shell: pwsh
        run: pwsh -File eng/Generate-PackageCatalog.ps1

      - name: Pack affected public packages
        shell: pwsh
        run: pwsh -File eng/Pack-PublicPackages.ps1 -Configuration Release -OutputPath ./nupkgs -PackageVersion ${{ steps.git_version.outputs.semVer }} -AffectedOnly -Base ${{ steps.diff_base.outputs.mergeBase }} -Head HEAD

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          if-no-files-found: warn
          path: ./nupkgs/*.nupkg

      - name: Upload blocking artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blocking-lane-artifacts
          path: artifacts/codex/test-results/blocking/

  observational:
    name: Observational lane
    runs-on: ubuntu-latest
    needs: smoke
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run observational lane
        shell: pwsh
        run: pwsh -File scripts/quality/run-observational-tests.ps1 -NoRestore -NoBuild

      - name: Upload observational artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observational-lane-artifacts
          path: artifacts/codex/test-results/observational/

  advisory:
    name: Advisory quality lane
    runs-on: ubuntu-latest
    needs: smoke
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Incursa.Platform.CI.slnx

      - name: Restore tools
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build Incursa.Platform.CI.slnx --no-restore --configuration Release

      - name: Run advisory quality evidence
        shell: pwsh
        run: pwsh -File scripts/quality/run-quality-evidence.ps1 -NoRestore -NoBuild

      - name: Upload advisory artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: advisory-quality-artifacts
          path: |
            artifacts/codex/test-results/advisory/
            artifacts/codex/coverage/advisory/
            artifacts/quality/testing/
